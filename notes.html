<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>笔记 · Yapeng</title>
  <style>
    :root {
      --bg: #f8f9fa; --card-bg: #ffffff; --text: #212529; --muted: #6c757d;
      --accent: #0d6efd; --border: #dee2e6; --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.7;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .navbar {
      background: var(--card-bg); border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100;
    }
    .navbar-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.5rem;
    }
    .navbar .brand { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .navbar .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .navbar .nav-links a { text-decoration: none; color: var(--muted); font-weight: 500; transition: color .15s; }
    .navbar .nav-links a:hover, .navbar .nav-links a.active { color: var(--accent); }

    .main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; flex: 1; width: 100%; }
    .card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border); padding: 2rem; margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.35rem; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 2px solid var(--accent); }
    .card small { color: var(--muted); display: block; margin-top: .5rem; }

    .tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .tab {
      padding: .6rem 1rem; border-radius: 999px; border: 1px solid var(--border); background: #fff;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .user-bar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem;
      padding: .75rem 1rem; background: #e7f1ff; border-radius: 10px; margin-bottom: 1rem;
    }
    .user-bar .welcome { font-weight: 500; }
    .user-bar .btn-sm {
      padding: .35rem .9rem; border-radius: 8px; border: 1px solid var(--accent);
      background: transparent; color: var(--accent); cursor: pointer; font-size: .85rem;
    }
    .user-bar .btn-sm:hover { background: var(--accent); color: #fff; }

    .note-list { list-style: none; margin: 0; padding: 0; }
    .note-item {
      padding: 1rem; border: 1px solid var(--border); border-radius: 10px; margin-bottom: .85rem;
      transition: box-shadow .15s; cursor: pointer;
    }
    .note-item:hover { box-shadow: var(--shadow); }
    .note-title { font-size: 1.05rem; font-weight: 600; color: var(--accent); }
    .note-meta { color: var(--muted); font-size: .9rem; margin-top: .35rem; }
    .note-author {
      color: var(--accent); cursor: pointer; text-decoration: underline;
      text-underline-offset: 2px;
    }
    .note-author:hover { opacity: .8; }
    .note-empty { text-align: center; color: var(--muted); padding: 2rem 1rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: .35rem; font-weight: 500; }
    .form-group input, .form-group textarea { width: 100%; padding: .85rem 1rem; border: 1px solid var(--border); border-radius: 10px; font-size: .95rem; }
    .form-group textarea { min-height: 160px; resize: vertical; }
    .form-note { font-size: .88rem; color: var(--muted); margin-top: .25rem; }
    .btn { background: var(--accent); color: #fff; border: none; padding: .75rem 1.5rem; border-radius: 10px; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error-box { color: #dc3545; margin-bottom: 1rem; display: none; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); padding: 2rem; width: min(760px, 90%); max-height: 85vh; overflow-y: auto; position: relative; }
    .close-btn { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); }
    .modal h3 { margin-bottom: .75rem; }
    .modal pre { background: #f5f5f5; padding: 1rem; border-radius: 10px; white-space: pre-wrap; word-break: break-word; }

    footer { text-align: center; padding: 1.5rem; color: var(--muted); font-size: .85rem; border-top: 1px solid var(--border); margin-top: 2rem; }
    @media (max-width: 720px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="brand" href="index.html">🏠 Yapeng</a>
    <ul class="nav-links">
      <li><a href="index.html">简历</a></li>
      <li><a href="notes.html" class="active">笔记</a></li>
      <li><a href="guestbook.html">留言板</a></li>
    </ul>
  </div>
</nav>

<div class="main">
  <div class="card">
    <h2>📝 笔记中心</h2>
    <small>每个 Markdown 文件对应一篇笔记，注册后可上传。</small>

    <div class="user-bar" id="userBar">
      <span class="welcome" id="userWelcome">未登录</span>
      <button class="btn-sm" id="userActionBtn" onclick="showSection('account')">登录 / 注册</button>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabList" onclick="showSection('list')">笔记列表</button>
      <button class="tab" id="tabUpload" onclick="showSection('upload')">上传笔记</button>
      <button class="tab" id="tabProfile" onclick="showSection('profile')" style="display:none;">个人主页</button>
      <button class="tab" id="tabAccount" onclick="showSection('account')">登录 / 注册</button>
    </div>

    <div id="sectionList">
      <ul class="note-list" id="noteList"></ul>
    </div>

    <div id="sectionUpload" style="display:none;">
      <div class="error-box" id="uploadError"></div>
      <form id="noteUploadForm" onsubmit="submitNote(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="noteTitle">标题 *</label>
            <input id="noteTitle" type="text" maxlength="120" placeholder="请输入笔记标题" required />
          </div>
          <div class="form-group">
            <label for="noteFilename">文件名（选填）</label>
            <input id="noteFilename" type="text" placeholder="例如 my-note.md" />
            <div class="form-note">不填则根据标题自动生成，文件名会转为安全格式。</div>
          </div>
        </div>
        <div class="form-group">
          <label for="noteFile">从本地选择 Markdown 文件</label>
          <input id="noteFile" type="file" accept=".md,text/markdown" />
          <div class="form-note">选择本地 .md 文件后会自动加载标题与内容。</div>
        </div>
        <div class="form-group">
          <label for="noteContent">Markdown 内容 *</label>
          <textarea id="noteContent" placeholder="请输入 Markdown 内容" required></textarea>
        </div>
        <div class="form-group" id="uploadKeyGroup">
          <label for="uploadKey">上传密码（未登录时使用）</label>
          <input id="uploadKey" type="password" placeholder="未登录时请输入上传密码" />
        </div>
        <button type="submit" class="btn">上传笔记</button>
      </form>
    </div>

    <div id="sectionAccount" style="display:none;">
      <div class="error-box" id="accountError"></div>
      <div id="loginForm">
        <h3 style="margin-bottom:.75rem;">登录</h3>
        <div class="form-group">
          <label for="loginUsername">用户名</label>
          <input id="loginUsername" type="text" maxlength="30" placeholder="请输入用户名" />
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input id="loginPassword" type="password" placeholder="请输入密码" />
        </div>
        <button class="btn" onclick="doLogin()">登录</button>
        <small style="margin-left:.75rem;color:var(--muted);cursor:pointer;" onclick="toggleAuthForm()">没有账号？去注册</small>
      </div>
      <div id="registerForm" style="display:none;">
        <h3 style="margin-bottom:.75rem;">注册</h3>
        <div class="form-group">
          <label for="regUsername">用户名</label>
          <input id="regUsername" type="text" maxlength="30" placeholder="请输入用户名" />
        </div>
        <div class="form-group">
          <label for="regPassword">密码（至少4位）</label>
          <input id="regPassword" type="password" placeholder="请输入密码" />
        </div>
        <div class="form-group">
          <label for="regPassword2">确认密码</label>
          <input id="regPassword2" type="password" placeholder="请再次输入密码" />
        </div>
        <button class="btn" onclick="doRegister()">注册</button>
        <small style="margin-left:.75rem;color:var(--muted);cursor:pointer;" onclick="toggleAuthForm()">已有账号？去登录</small>
      </div>
    </div>

    <div id="sectionProfile" style="display:none;">
      <div class="error-box" id="profileError"></div>
      <div id="profileViewSelf" style="display:none;">
        <h3 style="margin-bottom:.75rem;">我的主页</h3>
        <form id="profileForm" onsubmit="saveProfile(event)">
          <div class="form-group">
            <label for="profileDisplayName">显示名称</label>
            <input id="profileDisplayName" type="text" maxlength="50" placeholder="请输入显示名称" />
          </div>
          <div class="form-group">
            <label for="profileBio">个人简介</label>
            <textarea id="profileBio" maxlength="500" placeholder="介绍一下自己..." style="min-height:100px;"></textarea>
            <div class="form-note">最多 500 个字符。</div>
          </div>
          <div class="form-group">
            <label>主页可见性</label>
            <div style="display:flex;gap:1.5rem;margin-top:.35rem;">
              <label><input type="radio" name="privacy" value="public" checked /> 公开</label>
              <label><input type="radio" name="privacy" value="private" /> 私密</label>
            </div>
          </div>
          <button type="submit" class="btn">保存</button>
        </form>
      </div>
      <div id="profileViewOther" style="display:none;">
        <h3 id="profileOtherTitle"></h3>
        <p id="profileOtherBio" style="color:var(--muted);white-space:pre-wrap;margin:1rem 0;"></p>
        <div id="profileOtherMeta" style="color:var(--muted);font-size:.9rem;"></div>
      </div>
      <div id="profilePrivate" style="display:none;text-align:center;color:var(--muted);padding:2rem;">
        该用户已将主页设为私密。
      </div>
      <div id="profileNotFound" style="display:none;text-align:center;color:var(--muted);padding:2rem;">
        用户不存在。
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3 id="modalTitle"></h3>
    <p id="modalMeta"></p>
    <pre id="modalContent"></pre>
  </div>
</div>

<footer>© 2026 Yapeng Wang · Hosted on GitHub Pages</footer>

<script>
const API_BASE = '';
let notes = [];
let userToken = localStorage.getItem('notes_token') || '';
let username = localStorage.getItem('notes_username') || '';

function showSection(name) {
  document.getElementById('sectionList').style.display = name === 'list' ? 'block' : 'none';
  document.getElementById('sectionUpload').style.display = name === 'upload' ? 'block' : 'none';
  document.getElementById('sectionAccount').style.display = name === 'account' ? 'block' : 'none';
  document.getElementById('sectionProfile').style.display = name === 'profile' ? 'block' : 'none';
  document.getElementById('tabList').classList.toggle('active', name === 'list');
  document.getElementById('tabUpload').classList.toggle('active', name === 'upload');
  document.getElementById('tabAccount').classList.toggle('active', name === 'account');
  document.getElementById('tabProfile').classList.toggle('active', name === 'profile');

  if (name === 'profile' && username) {
    loadMyProfile();
  }

  if (name === 'upload') {
    const keyGroup = document.getElementById('uploadKeyGroup');
    if (userToken) {
      keyGroup.style.display = 'none';
      document.getElementById('uploadKey').required = false;
    } else {
      keyGroup.style.display = 'block';
      document.getElementById('uploadKey').required = true;
    }
  }
}

function updateUserBar() {
  const bar = document.getElementById('userWelcome');
  const btn = document.getElementById('userActionBtn');
  const tabProfile = document.getElementById('tabProfile');
  if (username) {
    bar.innerHTML = '👤 <span style="cursor:pointer;text-decoration:underline;" onclick="showSection(\'profile\')">' + username + '</span>';
    btn.textContent = '退出登录';
    btn.onclick = doLogout;
    tabProfile.style.display = '';
  } else {
    bar.textContent = '未登录';
    btn.textContent = '登录 / 注册';
    btn.onclick = () => showSection('account');
    tabProfile.style.display = 'none';
  }
}

function toggleAuthForm() {
  const login = document.getElementById('loginForm');
  const register = document.getElementById('registerForm');
  const err = document.getElementById('accountError');
  err.style.display = 'none';
  if (login.style.display === 'none') {
    login.style.display = 'block';
    register.style.display = 'none';
  } else {
    login.style.display = 'none';
    register.style.display = 'block';
  }
}

async function apiRequest(url, options = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
  const data = await res.json();
  if (!res.ok || !data.success) {
    throw new Error(data.error || `请求失败 (${res.status})`);
  }
  return data;
}

function renderNoteList() {
  const list = document.getElementById('noteList');
  if (!notes.length) {
    list.innerHTML = '<li class="note-empty">暂无笔记，您可以上传第一篇笔记。</li>';
    return;
  }
  list.innerHTML = notes.map(note => `
    <li class="note-item" onclick="openNote('${encodeURIComponent(note.filename)}')">
      <div class="note-title">${note.title}</div>
      <div class="note-meta">${note.author ? '<span class="note-author" onclick="event.stopPropagation();viewProfile(\'' + note.author + '\')">' + note.author + '</span> · ' : ''}${new Date(note.created_at).toLocaleString()}</div>
    </li>
  `).join('');
}

async function loadNotes() {
  try {
    const data = await apiRequest(`${API_BASE}/api/notes`);
    notes = data.data.notes;
    renderNoteList();
  } catch (err) {
    document.getElementById('noteList').innerHTML = `<li class="note-empty">加载笔记失败：${err.message}</li>`;
  }
}

async function openNote(filename) {
  try {
    const data = await apiRequest(`${API_BASE}/api/notes/${filename}`);
    document.getElementById('modalTitle').textContent = data.data.filename;
    document.getElementById('modalMeta').textContent = '';
    document.getElementById('modalContent').textContent = data.data.content;
    document.getElementById('modalOverlay').classList.add('open');
  } catch (err) {
    alert('读取笔记失败：' + err.message);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function loadLocalFile() {
  const fileInput = document.getElementById('noteFile');
  const file = fileInput.files[0];
  if (!file) return;
  const name = file.name || '';
  if (!name.toLowerCase().endsWith('.md')) {
    alert('请选择 .md 格式的文件。');
    fileInput.value = '';
    return;
  }
  const text = await file.text();
  if (!document.getElementById('noteTitle').value.trim()) {
    const firstLine = text.split(/\r?\n/)[0] || '';
    document.getElementById('noteTitle').value = firstLine.replace(/^#\s*/, '').trim();
  }
  if (!document.getElementById('noteFilename').value.trim()) {
    document.getElementById('noteFilename').value = name;
  }
  document.getElementById('noteContent').value = text;
}

async function submitNote(event) {
  event.preventDefault();
  const title = document.getElementById('noteTitle').value.trim();
  const content = document.getElementById('noteContent').value.trim();
  const uploadKey = document.getElementById('uploadKey').value.trim();
  const filename = document.getElementById('noteFilename').value.trim();
  const errorBox = document.getElementById('uploadError');

  if (!title || !content) {
    errorBox.textContent = '请填写标题和内容。';
    errorBox.style.display = 'block';
    return;
  }

  const body = { title, content, filename };
  if (userToken) {
    body.token = userToken;
  } else {
    if (!uploadKey) {
      errorBox.textContent = '请先登录或输入上传密码。';
      errorBox.style.display = 'block';
      return;
    }
    body.upload_key = uploadKey;
  }

  try {
    await apiRequest(`${API_BASE}/api/notes`, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    errorBox.style.display = 'none';
    document.getElementById('noteUploadForm').reset();
    await loadNotes();
    showSection('list');
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
  }
}

async function doLogin() {
  const usernameInput = document.getElementById('loginUsername').value.trim();
  const passwordInput = document.getElementById('loginPassword').value.trim();
  const err = document.getElementById('accountError');

  if (!usernameInput || !passwordInput) {
    err.textContent = '请填写用户名和密码。';
    err.style.display = 'block';
    return;
  }
  try {
    const data = await apiRequest(`${API_BASE}/api/users/login`, {
      method: 'POST',
      body: JSON.stringify({ username: usernameInput, password: passwordInput })
    });
    userToken = data.data.token;
    username = data.data.username;
    localStorage.setItem('notes_token', userToken);
    localStorage.setItem('notes_username', username);
    updateUserBar();
    err.style.display = 'none';
    showSection('list');
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

async function doRegister() {
  const usernameInput = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const password2 = document.getElementById('regPassword2').value.trim();
  const err = document.getElementById('accountError');

  if (!usernameInput || !password) {
    err.textContent = '请填写用户名和密码。';
    err.style.display = 'block';
    return;
  }
  if (password !== password2) {
    err.textContent = '两次密码不一致。';
    err.style.display = 'block';
    return;
  }
  if (password.length < 4) {
    err.textContent = '密码至少 4 个字符。';
    err.style.display = 'block';
    return;
  }
  try {
    const data = await apiRequest(`${API_BASE}/api/users/register`, {
      method: 'POST',
      body: JSON.stringify({ username: usernameInput, password })
    });
    userToken = data.data.token;
    username = data.data.username;
    localStorage.setItem('notes_token', userToken);
    localStorage.setItem('notes_username', username);
    updateUserBar();
    err.style.display = 'none';
    showSection('list');
    document.getElementById('regUsername').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regPassword2').value = '';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

async function loadMyProfile() {
  if (!username || !userToken) return;
  try {
    const data = await apiRequest(`${API_BASE}/api/users/me?token=${encodeURIComponent(userToken)}`);
    document.getElementById('profileDisplayName').value = data.data.display_name || '';
    document.getElementById('profileBio').value = data.data.bio || '';
    const privacy = data.data.privacy || 'public';
    document.querySelector('input[name="privacy"][value="' + privacy + '"]').checked = true;
    document.getElementById('profileViewSelf').style.display = 'block';
    document.getElementById('profileViewOther').style.display = 'none';
    document.getElementById('profilePrivate').style.display = 'none';
    document.getElementById('profileNotFound').style.display = 'none';
  } catch (e) {
    document.getElementById('profileError').textContent = e.message;
    document.getElementById('profileError').style.display = 'block';
  }
}

async function saveProfile(event) {
  event.preventDefault();
  const displayName = document.getElementById('profileDisplayName').value.trim();
  const bio = document.getElementById('profileBio').value.trim();
  const privacy = document.querySelector('input[name="privacy"]:checked').value;
  const err = document.getElementById('profileError');

  try {
    await apiRequest(`${API_BASE}/api/profile`, {
      method: 'PUT',
      body: JSON.stringify({ token: userToken, display_name: displayName, bio, privacy })
    });
    err.style.display = 'none';
    alert('个人信息已保存。');
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

async function viewProfile(targetUser) {
  showSection('profile');
  document.getElementById('profileViewSelf').style.display = 'none';
  document.getElementById('profileViewOther').style.display = 'none';
  document.getElementById('profilePrivate').style.display = 'none';
  document.getElementById('profileNotFound').style.display = 'none';
  document.getElementById('profileError').style.display = 'none';

  if (targetUser === username) {
    loadMyProfile();
    return;
  }

  try {
    const data = await apiRequest(`${API_BASE}/api/profile/${encodeURIComponent(targetUser)}`);
    if (data.data.privacy === 'private') {
      document.getElementById('profilePrivate').style.display = 'block';
      return;
    }
    document.getElementById('profileOtherTitle').textContent = '👤 ' + (data.data.display_name || data.data.username);
    document.getElementById('profileOtherBio').textContent = data.data.bio || '该用户还没有填写简介。';
    document.getElementById('profileOtherMeta').innerHTML =
      '笔记数：' + (data.data.notes_count || 0) +
      ' · 注册于 ' + new Date(data.data.created_at).toLocaleDateString();
    document.getElementById('profileViewOther').style.display = 'block';
  } catch (e) {
    if (e.message.includes('404') || e.message.includes('不存在')) {
      document.getElementById('profileNotFound').style.display = 'block';
    } else {
      document.getElementById('profileError').textContent = e.message;
      document.getElementById('profileError').style.display = 'block';
    }
  }
}

async function doLogout() {
  try {
    if (userToken) {
      await apiRequest(`${API_BASE}/api/users/logout`, {
        method: 'POST',
        body: JSON.stringify({ token: userToken })
      });
    }
  } catch (e) { /* ignore */ }
  userToken = '';
  username = '';
  localStorage.removeItem('notes_token');
  localStorage.removeItem('notes_username');
  updateUserBar();
  showSection('list');
}

document.addEventListener('DOMContentLoaded', () => {
  updateUserBar();
  loadNotes();
  const noteFile = document.getElementById('noteFile');
  if (noteFile) {
    noteFile.addEventListener('change', loadLocalFile);
  }
});
</script>

</body>
