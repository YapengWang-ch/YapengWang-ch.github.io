    :root {
      --bg: #f8f9fa; --card-bg: #ffffff; --text: #212529; --muted: #6c757d;

    }
    .navbar-inner {

      display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.5rem;
    }
    .navbar .brand { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }

    .navbar .nav-links a:hover, .navbar .nav-links a.active { color: var(--accent); }

    .main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; flex: 1; width: 100%; }
    .card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border); padding: 2rem; margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.35rem; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 2px solid var(--accent); }

    /* ── 搜索 & 筛选 ── */
    .filter-bar { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-bar input {
      flex: 1; min-width: 200px; padding: .6rem 1rem;
      border: 1px solid var(--border); border-radius: 8px; font-size: .95rem;
    }
    .tag-filter { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .tag-chip {
      padding: .3rem .8rem; border-radius: 20px; font-size: .8rem; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--muted); transition: all .15s;
    }
    .tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 笔记列表 ── */
    .note-list { list-style: none; }
    .note-item {
      padding: 1rem; border: 1px solid var(--border); border-radius: 8px; margin-bottom: .75rem;
      transition: box-shadow .15s;
    }
    .note-item:hover { box-shadow: var(--shadow); }
    .note-item .note-title { font-size: 1.05rem; font-weight: 600; color: var(--accent); cursor: pointer; }
    .note-item .note-meta { font-size: .8rem; color: var(--muted); margin: .25rem 0; }
    .note-item .note-preview { font-size: .9rem; color: var(--text); margin-top: .3rem; }
    .note-tag {
      display: inline-block; background: #e7f1ff; color: var(--accent);
      padding: .1rem .5rem; border-radius: 10px; font-size: .75rem; margin-right: .3rem;

    /* ── 笔记详情弹窗 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: var(--radius); padding: 2rem;
      max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative;
    }
    .modal .close-btn {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted);
    }
    .modal h3 { margin-bottom: .5rem; }
    .modal .modal-date { color: var(--muted); font-size: .85rem; margin-bottom: 1rem; }
    .modal .modal-body { line-height: 1.8; }
    .modal .modal-body pre {

    }

    footer {
      text-align: center; padding: 1.5rem; color: var(--muted);
      font-size: .85rem; border-top: 1px solid var(--border); margin-top: 2rem;
    }
    @media (max-width: 600px) { .navbar-inner { flex-direction: column; gap: .5rem; } }

### 两味振荡
真空中的存活概率：

$$P(\\nu_\\alpha \\to \\nu_\\alpha) = 1 - \\sin^2 2\\theta \\cdot \\sin^2\\left(\\frac{\\Delta m^2 L}{4E}\\right)$$

转换概率：

$$P(\\nu_\\alpha \\to \\nu_\\beta) = \\sin^2 2\\theta \\cdot \\sin^2\\left(\\frac{\\Delta m^2 L}{4E}\\right)$$

### 三味振荡（真空）
完整的三味振荡概率由 PMNS 矩阵 $U$ 给出：

$$P(\\nu_\\alpha \\to \\nu_\\beta) = \\delta_{\\alpha\\beta} - 4\\sum_{i>j}\\Re(U_{\\alpha i}^* U_{\\beta i} U_{\\alpha j} U_{\\beta j}^*) \\sin^2\\frac{\\Delta m_{ij}^2 L}{4E}$$
$$+ 2\\sum_{i>j}\\Im(U_{\\alpha i}^* U_{\\beta i} U_{\\alpha j} U_{\\beta j}^*) \\sin\\frac{\\Delta m_{ij}^2 L}{2E}$$

### 物质效应
在物质中，MSW 效应修改混合角：

$$\\sin^2 2\\theta_m = \\frac{\\sin^2 2\\theta}{(\\cos 2\\theta - A/\\Delta m^2)^2 + \\sin^2 2\\theta}$$

其中 $A = 2\\sqrt{2} G_F N_e E$。`

// ═══════════ 渲染笔记列表 ═══════════
let activeTag = null;

function getAllTags() {
  const tagSet = new Set();
  notes.forEach(n => n.tags.forEach(t => tagSet.add(t)));
  return [...tagSet].sort();
}

function renderTagFilter() {
  const container = document.getElementById('tagFilter');
  const tags = getAllTags();
  container.innerHTML = tags.map(t =>
    `<span class="tag-chip${t === activeTag ? ' active' : ''}" onclick="toggleTag('${t}')">${t}</span>`
  ).join('');
}

function toggleTag(tag) {
  activeTag = (activeTag === tag) ? null : tag;
  renderTagFilter();
  renderNotes();
}

function renderNotes() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('noteList');

  const filtered = notes.filter(n => {
    const matchSearch = !search || n.title.toLowerCase().includes(search) || n.preview.toLowerCase().includes(search) || n.tags.some(t => t.toLowerCase().includes(search));
    const matchTag = !activeTag || n.tags.includes(activeTag);
    return matchSearch && matchTag;
  });

  list.innerHTML = filtered.map(n => `
    <li class="note-item">
      <div class="note-title" onclick="openNote(${n.id})">${n.title}</div>
      <div class="note-meta">${n.date} · ${n.tags.map(t => `<span class="note-tag">${t}</span>`).join(' ')}</div>
      <div class="note-preview">${n.preview}</div>
    </li>
  `).join('') || '<li style="color:var(--muted);text-align:center;padding:2rem;">没有找到匹配的笔记 📭</li>';
}

function openNote(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  document.getElementById('modalTitle').textContent = n.title;
  document.getElementById('modalDate').textContent = n.date + ' · ' + n.tags.join(', ');
  // 简单 Markdown → HTML
  let html = n.content
    .replace(/### (.+)/g, '<h4>$1</h4>')
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`{3}(\w*)\n([\s\S]*?)`{3}/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
  // 渲染 KaTeX 公式
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { throwOnError: false, displayMode: true }); } catch(e) { return `<em>${tex}</em>`; }
  });
  html = html.replace(/\$([^$]+)\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { throwOnError: false, displayMode: false }); } catch(e) { return `<em>${tex}</em>`; }
  });
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// 键盘关闭弹窗
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// 初始化
renderTagFilter();
renderNotes();
</script>
